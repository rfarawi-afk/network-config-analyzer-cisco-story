ASA Version 9.14(1)
hostname CORP-ASA-FW01
domain-name corp.local

interface GigabitEthernet0/0
 nameif outside
 security-level 0
 ip address 203.0.113.1 255.255.255.0

interface GigabitEthernet0/1
 nameif inside
 security-level 100
 ip address 10.0.1.1 255.255.255.0

access-list OUTSIDE_IN extended permit tcp any host 10.0.1.50 eq 443
access-list OUTSIDE_IN extended permit tcp any host 10.0.1.50 eq 80
access-list OUTSIDE_IN extended deny ip any any log

access-group OUTSIDE_IN in interface outside

nat (inside,outside) dynamic interface

object network OBJ_INTERNAL
 subnet 10.0.1.0 255.255.255.0

policy-map global_policy
 class inspection_default
  inspect dns
  inspect ftp
  inspect http
  inspect icmp

service-policy global_policy global

logging enable
logging timestamp
logging buffered warnings
logging trap informational
logging host inside 10.0.1.100

aaa authentication ssh console LOCAL
username admin privilege 15 password <removed>
ssh 10.0.1.0 255.255.255.0 inside
ssh timeout 10
no telnet
