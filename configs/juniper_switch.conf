system {
    host-name CORP-JNP-SW01;
    domain-name corp.local;
    time-zone America/New_York;
    authentication-order [ password ];
    root-authentication {
        encrypted-password "<removed>";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "<removed>";
            }
        }
    }
    services {
        ssh {
            root-login deny;
            protocol-version v2;
        }
        netconf {
            ssh;
        }
    }
    syslog {
        host 10.0.4.100 {
            any info;
            port 514;
        }
        file messages {
            any notice;
            authorization info;
        }
    }
    ntp {
        server 216.239.35.0;
    }
}

interfaces {
    ge-0/0/0 {
        description "Uplink to Core";
        unit 0 {
            family inet {
                address 10.0.4.1/24;
            }
        }
    }
    ge-0/0/1 {
        description "Access Port - VLAN 10";
        unit 0 {
            family ethernet-switching {
                vlan {
                    members vlan10;
                }
            }
        }
    }
}

vlans {
    vlan10 {
        vlan-id 10;
        description "User VLAN";
    }
    vlan20 {
        vlan-id 20;
        description "Server VLAN";
    }
}

firewall {
    filter BLOCK_TELNET {
        term deny-telnet {
            from {
                protocol tcp;
                destination-port telnet;
            }
            then {
                discard;
                log;
            }
        }
        term allow-rest {
            then accept;
        }
    }
}
